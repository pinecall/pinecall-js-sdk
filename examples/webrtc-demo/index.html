<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinecall WebRTC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-thin { scrollbar-width: thin; scrollbar-color: rgba(80,80,120,0.3) transparent; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(80,80,120,0.3); border-radius: 2px; }
    @keyframes fade-up { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse-ring { 0% { transform:scale(1); opacity:0.5 } 100% { transform:scale(2.2); opacity:0 } }
    .animate-fade-up { animation: fade-up 0.25s ease-out; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body class="bg-[#0b0b18] text-white min-h-screen flex flex-col">

  <!-- Top bar -->
  <header class="flex items-center justify-between px-8 py-5">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
      <span class="text-sm text-gray-400 tracking-wide">Pinecall WebRTC</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="duration" class="text-xs font-mono text-gray-500 hidden tabular-nums">0:00</span>
      <button id="eventsToggle" onclick="toggleEvents()"
        class="text-xs px-3 py-1.5 rounded-lg glass text-gray-400 hover:text-white transition cursor-pointer">
        Events <span id="eventCount" class="text-gray-600">(0)</span>
      </button>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <!-- Main column -->
    <div class="flex-1 flex flex-col px-8 pb-6">

      <!-- Waveform -->
      <div id="waveformContainer" class="mb-4 hidden">
        <div class="glass rounded-xl px-5 py-3">
          <div class="flex items-center justify-between mb-2">
            <span class="text-[10px] uppercase tracking-widest text-gray-500">Audio</span>
            <span id="waveLabel" class="text-[10px] tracking-wide text-gray-600 transition-colors">Idle</span>
          </div>
          <canvas id="waveCanvas" class="w-full rounded" style="height:44px"></canvas>
        </div>
      </div>

      <!-- Chat -->
      <div id="chat" class="flex-1 overflow-y-auto space-y-4 scrollbar-thin pr-2">
        <div id="emptyState" class="flex flex-col items-center justify-center h-full gap-6">
          <div class="w-16 h-16 rounded-2xl glass flex items-center justify-center">
            <svg class="w-7 h-7 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
            </svg>
          </div>
          <div class="text-center">
            <p class="text-gray-400 text-sm">Press to start a conversation</p>
            <p class="text-gray-600 text-xs mt-1">Agent: <span id="agentLabel" class="text-gray-500">minimal</span></p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-4 pt-6">
        <button id="muteBtn" onclick="doMute()"
          class="hidden w-12 h-12 rounded-full glass text-lg hover:bg-white/5 transition cursor-pointer">🎙️</button>

        <div class="relative">
          <button id="callBtn" onclick="toggleCall()"
            class="relative z-10 w-16 h-16 rounded-full bg-emerald-500 text-white text-xl shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
            </svg>
          </button>
          <div id="callRing" class="hidden absolute inset-0 rounded-full border-2 border-emerald-400" style="animation: pulse-ring 1.5s ease-out infinite"></div>
        </div>

        <button id="sendBtn" onclick="sendDC()"
          class="hidden w-12 h-12 rounded-full glass text-sm hover:bg-white/5 transition cursor-pointer" title="Send data channel message">📤</button>
      </div>
      <p id="status" class="text-center text-[11px] text-gray-600 mt-3">Ready</p>
    </div>

    <!-- Events panel -->
    <aside id="eventsPanel" class="hidden w-80 border-l border-white/5 flex flex-col bg-[#0d0d1a]">
      <div class="flex items-center justify-between px-5 py-4 border-b border-white/5">
        <span class="text-[10px] uppercase tracking-widest text-gray-500">Data Channel Events</span>
        <button onclick="clearEvents()" class="text-gray-600 hover:text-gray-400 text-xs cursor-pointer">Clear</button>
      </div>
      <div id="eventsList" class="flex-1 overflow-y-auto scrollbar-thin"></div>
    </aside>
  </div>

  <!-- SDK -->
  <script src="../../dist/pinecall-webrtc.iife.global.js"></script>
  <script>
    // ── Config ─────────────────────────────────────────────────
    // Agent ID from URL param or default
    const AGENT_ID = new URLSearchParams(location.search).get('agent') || 'minimal';

    const { PinecallWebRTC } = Pinecall;
    let webrtc = null;
    let events = [];
    let durationTimer = null;
    let callStart = 0;
    let botMessages = {};
    let audioCtx = null;
    let waveAnimFrame = null;

    agentLabel.textContent = AGENT_ID;

    // ── Waveform ──────────────────────────────────────────────
    let userAnalyser = null, agentAnalyser = null;
    let userHistory = new Array(80).fill(0);
    let agentHistory = new Array(80).fill(0);

    function startWaveform(localStream, remoteStream) {
      audioCtx = new AudioContext();
      // User mic analyser
      if (localStream) {
        const src = audioCtx.createMediaStreamSource(localStream);
        userAnalyser = audioCtx.createAnalyser();
        userAnalyser.fftSize = 256;
        src.connect(userAnalyser);
      }
      // Agent audio analyser
      if (remoteStream) {
        const src2 = audioCtx.createMediaStreamSource(remoteStream);
        agentAnalyser = audioCtx.createAnalyser();
        agentAnalyser.fftSize = 256;
        src2.connect(agentAnalyser);
      }
      waveformContainer.classList.remove('hidden');
      drawWave();
    }

    function addRemoteStream(remoteStream) {
      if (!audioCtx || !remoteStream) return;
      try {
        const src = audioCtx.createMediaStreamSource(remoteStream);
        agentAnalyser = audioCtx.createAnalyser();
        agentAnalyser.fftSize = 256;
        src.connect(agentAnalyser);
      } catch(e) { /* ignore */ }
    }

    function stopWaveform() {
      if (waveAnimFrame) cancelAnimationFrame(waveAnimFrame);
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      userAnalyser = null; agentAnalyser = null;
      userHistory = new Array(80).fill(0);
      agentHistory = new Array(80).fill(0);
      waveformContainer.classList.add('hidden');
    }

    function getRms(analyser) {
      if (!analyser) return 0;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
      return Math.sqrt(sum / data.length);
    }

    function drawWave() {
      const canvas = waveCanvas;
      const ctx = canvas.getContext('2d');
      const dpr = devicePixelRatio || 1;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      const userRms = getRms(userAnalyser);
      const agentRms = getRms(agentAnalyser);

      userHistory.push(Math.min(1, userRms * 5));
      agentHistory.push(Math.min(1, agentRms * 5));
      if (userHistory.length > 80) userHistory.shift();
      if (agentHistory.length > 80) agentHistory.shift();

      // Label
      const userSpeaking = userRms > 0.02;
      const agentSpeaking = agentRms > 0.01;
      if (userSpeaking) { waveLabel.textContent = 'You'; waveLabel.style.color = '#4ade80'; }
      else if (agentSpeaking) { waveLabel.textContent = 'Agent'; waveLabel.style.color = '#a78bfa'; }
      else { waveLabel.textContent = 'Listening'; waveLabel.style.color = '#6b7280'; }

      const mid = h / 2;
      const barW = 2.5, gap = 1.5;
      const total = Math.min(80, Math.floor(w / (barW + gap)));
      const startX = (w - total * (barW + gap) + gap) / 2;

      for (let i = 0; i < total; i++) {
        const idx = 80 - total + i;
        const uI = userHistory[idx] || 0;
        const aI = agentHistory[idx] || 0;
        const intensity = Math.max(uI, aI);
        const isAgent = aI > uI;
        const barH = Math.max(1, intensity * h * 0.4);

        if (intensity > 0.01) {
          const grad = ctx.createLinearGradient(0, mid - barH, 0, mid + barH);
          if (isAgent) {
            // Purple for agent
            grad.addColorStop(0, 'rgba(167,139,250,0.05)');
            grad.addColorStop(0.5, `rgba(167,139,250,${0.3 + intensity * 0.7})`);
            grad.addColorStop(1, 'rgba(167,139,250,0.05)');
          } else {
            // Green for user
            grad.addColorStop(0, 'rgba(74,222,128,0.05)');
            grad.addColorStop(0.5, `rgba(74,222,128,${0.3 + intensity * 0.7})`);
            grad.addColorStop(1, 'rgba(74,222,128,0.05)');
          }
          ctx.fillStyle = grad;
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
        }
        ctx.beginPath();
        ctx.roundRect(startX + i * (barW + gap), mid - barH, barW, barH * 2, 1);
        ctx.fill();
      }
      waveAnimFrame = requestAnimationFrame(drawWave);
    }

    // ── Chat ──────────────────────────────────────────────────
    function addMsg(role, text, opts = {}) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const d = document.createElement('div');
      d.className = `${role === 'user' ? 'flex justify-end' : role === 'system' ? 'flex justify-center' : 'flex justify-start'} animate-fade-up`;

      const b = document.createElement('div');
      if (role === 'system') {
        b.className = 'px-4 py-2 rounded-full glass text-xs text-gray-400';
      } else if (role === 'user') {
        b.className = `max-w-[75%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${opts.interim ? 'glass opacity-50' : 'bg-emerald-500/10 border border-emerald-500/15 text-emerald-100'}`;
      } else {
        b.className = 'max-w-[75%] px-4 py-3 rounded-2xl glass text-sm text-gray-200 leading-relaxed';
      }
      b.textContent = text;
      if (opts.id) b.id = opts.id;
      d.appendChild(b);
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    function updateMsg(id, text, opts = {}) {
      const el = document.getElementById(id);
      if (!el) return;
      if (text) el.textContent = text;
      if (opts.interrupted) { el.classList.add('opacity-30'); el.style.textDecoration = 'line-through'; }
      if (opts.done) el.classList.remove('animate-pulse');
    }

    // ── Events ────────────────────────────────────────────────
    function addEvent(evt) {
      events.push(evt);
      eventCount.textContent = `(${events.length})`;
      const el = document.createElement('div');
      el.className = 'px-5 py-3 border-b border-white/[.03] cursor-pointer hover:bg-white/[.02] transition';
      const dot = evt.event?.startsWith('user') ? '#4ade80' : evt.event?.startsWith('bot') ? '#a78bfa' : '#60a5fa';
      el.innerHTML = `<div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:${dot}"></div><span class="text-xs font-mono text-gray-400 truncate">${evt.event}</span></div>`;
      el.onclick = () => {
        const pre = el.querySelector('pre');
        if (pre) { pre.remove(); return; }
        const p = document.createElement('pre');
        p.className = 'mt-2 text-[10px] p-3 rounded-lg bg-black/30 text-gray-500 overflow-auto max-h-40';
        p.style.whiteSpace = 'pre-wrap'; p.style.wordBreak = 'break-all';
        p.textContent = JSON.stringify(evt, null, 2);
        el.appendChild(p);
      };
      eventsList.appendChild(el);
      eventsList.scrollTop = eventsList.scrollHeight;
    }

    function clearEvents() { events = []; eventsList.innerHTML = ''; eventCount.textContent = '(0)'; }
    function toggleEvents() {
      eventsPanel.classList.toggle('hidden');
      eventsPanel.classList.toggle('flex');
    }

    // ── Duration ──────────────────────────────────────────────
    function startDuration() {
      callStart = Date.now();
      duration.classList.remove('hidden');
      durationTimer = setInterval(() => {
        const s = Math.floor((Date.now() - callStart) / 1000);
        duration.textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
      }, 1000);
    }
    function stopDuration() { if (durationTimer) { clearInterval(durationTimer); durationTimer = null; } }

    function doMute() {
      if (!webrtc) return;
      webrtc.toggleMute();
      muteBtn.textContent = webrtc.isMuted ? '🔇' : '🎙️';
    }

    function sendDC() {
      if (!webrtc) return;
      const msg = prompt('JSON to send via data channel');
      if (!msg) return;
      try { webrtc.send(JSON.parse(msg)); addEvent({ event: 'client.send', ...JSON.parse(msg) }); }
      catch { alert('Invalid JSON'); }
    }

    // ── Call ───────────────────────────────────────────────────
    async function toggleCall() {
      if (webrtc) {
        webrtc.disconnect(); webrtc = null;
        stopDuration(); stopWaveform();
        callBtn.innerHTML = '<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" /></svg>';
        callBtn.className = 'relative z-10 w-16 h-16 rounded-full bg-emerald-500 text-white text-xl shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center';
        callRing.classList.add('hidden');
        muteBtn.classList.add('hidden'); sendBtn.classList.add('hidden');
        status.textContent = 'Disconnected';
        return;
      }

      status.textContent = 'Connecting…';
      callRing.classList.remove('hidden');
      botMessages = {};

      try {
        // Just create with agent name — SDK auto-discovers everything
        webrtc = new PinecallWebRTC(AGENT_ID);

        webrtc.on('connected', () => {
          status.textContent = 'Connected';
          callBtn.innerHTML = '<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>';
          callBtn.className = 'relative z-10 w-16 h-16 rounded-full bg-red-500 text-white text-xl shadow-lg shadow-red-500/20 hover:bg-red-400 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center';
          callRing.classList.add('hidden');
          muteBtn.classList.remove('hidden'); sendBtn.classList.remove('hidden');
          chat.innerHTML = '';
          addMsg('system', 'Connected — start talking');
          startDuration();
          if (webrtc.localStream) startWaveform(webrtc.localStream, webrtc.remoteStream);
          // Remote stream may arrive after connect
          if (!webrtc.remoteStream) {
            const checkRemote = setInterval(() => {
              if (!webrtc) { clearInterval(checkRemote); return; }
              if (webrtc.remoteStream) { addRemoteStream(webrtc.remoteStream); clearInterval(checkRemote); }
            }, 200);
          }
        });

        webrtc.on('disconnected', () => {
          status.textContent = 'Disconnected'; stopDuration(); stopWaveform();
          callBtn.innerHTML = '<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" /></svg>';
          callBtn.className = 'relative z-10 w-16 h-16 rounded-full bg-emerald-500 text-white text-xl shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center';
          callRing.classList.add('hidden');
          muteBtn.classList.add('hidden'); sendBtn.classList.add('hidden'); webrtc = null;
        });

        webrtc.on('session.started', (d) => { addMsg('system', 'Session started'); addEvent({ event: 'session.started', ...d }); });

        let interimEl = null;
        webrtc.on('user.speaking', (d) => {
          if (!interimEl) interimEl = addMsg('user', d.text, { interim: true });
          else interimEl.textContent = d.text;
          addEvent({ event: 'user.speaking', text: d.text });
        });

        webrtc.on('user.message', (d) => {
          if (interimEl) { interimEl.textContent = d.text; interimEl.className = 'max-w-[75%] px-4 py-3 rounded-2xl text-sm leading-relaxed bg-emerald-500/10 border border-emerald-500/15 text-emerald-100'; interimEl = null; }
          else addMsg('user', d.text);
          addEvent({ event: 'user.message', text: d.text });
        });

        webrtc.on('bot.speaking', (d) => {
          const id = `bot-${d.message_id}`;
          const el = addMsg('bot', d.text || '…', { id });
          el.classList.add('animate-pulse');
          botMessages[d.message_id] = { words: [], el: id };
          addEvent({ event: 'bot.speaking', message_id: d.message_id });
        });

        webrtc.on('bot.word', (d) => {
          const e = botMessages[d.message_id];
          if (e) { e.words[d.word_index ?? e.words.length] = d.word; updateMsg(e.el, e.words.filter(Boolean).join(' ')); }
        });

        webrtc.on('bot.finished', (d) => {
          const e = botMessages[d.message_id];
          if (e) { if (d.text) updateMsg(e.el, d.text); updateMsg(e.el, null, { done: true }); }
          addEvent({ event: 'bot.finished', message_id: d.message_id });
        });

        webrtc.on('bot.interrupted', (d) => {
          const e = botMessages[d.message_id];
          if (e) updateMsg(e.el, null, { interrupted: true, done: true });
          addEvent({ event: 'bot.interrupted', message_id: d.message_id });
        });

        webrtc.on('audio.metrics', (d) => {
          if (d.is_speech) status.textContent = d.source === 'user' ? 'You are speaking' : 'Agent is speaking';
        });

        webrtc.on('turn.end', (d) => addEvent({ event: 'turn.end', ...d }));
        webrtc.on('config.updated', (d) => addEvent({ event: 'config.updated', ...d }));

        await webrtc.connect();
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        callRing.classList.add('hidden'); webrtc = null;
      }
    }
  </script>
</body>
</html>
